<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Ringensoft — Optimización Pesquera</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FishRoute Pro">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind config (debe ir DESPUÉS del CDN) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- FontAwesome 6 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    /* Animación pulse-ring para tarjetas ROJO */
    .alert-pulse {
      animation: alert-pulse 2s ease-in-out infinite;
    }
    @keyframes alert-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.45); }
      50%       { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }

    /* Ocultar scrollbar manteniendo funcionalidad */
    .scroll-hidden::-webkit-scrollbar { display: none; }
    .scroll-hidden { -ms-overflow-style: none; scrollbar-width: none; }

    /* Transición suave para todos los links */
    a, button { transition-property: color, background-color, border-color, box-shadow, opacity, transform; transition-duration: 150ms; }

    /* Estilo base para inputs */
    input, select, textarea {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-900" style="font-family:'Inter',sans-serif;">
<app-root></app-root>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
