<div class="min-h-screen flex items-center justify-center relative overflow-hidden font-sans">

  <div class="absolute inset-0 z-0">
    <img src="https://media.istockphoto.com/id/649765276/es/foto/la-pesca-de-arrastre.jpg?s=612x612&w=0&k=20&c=gcKloEnS9RKPF-4AdKA4lDJ0BYUCs4V87vMckiYpaGE="
         alt="Mar Peruano"
         class="w-full h-full object-cover animate-[pulse_60s_infinite]">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px]"></div>
  </div>

  <div class="relative z-10 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl w-full max-w-[400px] p-8 border-t-4 border-blue-600 animate-[fadeInUp_0.5s]">

    <div class="text-center mb-8">
      <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm ring-4 ring-blue-50/50">
        <i class="fas fa-anchor text-3xl text-blue-600"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">RingenSoft</h1>
      <p class="text-slate-500 text-sm mt-1 font-medium">Acceso a Flota</p>
    </div>

    <div *ngIf="errorMsg" class="mb-6 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r text-sm flex items-center shadow-sm">
      <i class="fas fa-exclamation-circle mr-2"></i> {{ errorMsg }}
    </div>

    <form (ngSubmit)="ingresar()" class="space-y-5">
      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-500 uppercase ml-1 tracking-wider">Usuario</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fas fa-user text-slate-400"></i></div>
          <input [(ngModel)]="usuario" name="usuario" type="text" required class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm placeholder:text-slate-300" placeholder="ID Corporativo">
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-500 uppercase ml-1 tracking-wider">Contraseña</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fas fa-lock text-slate-400"></i></div>
          <input [(ngModel)]="password" name="password" type="password" required class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm placeholder:text-slate-300" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" [disabled]="cargando" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 disabled:opacity-70 flex justify-center items-center">
        <span *ngIf="!cargando">INGRESAR</span>
        <div *ngIf="cargando"><i class="fas fa-circle-notch fa-spin mr-2"></i></div>
      </button>
    </form>

    <div class="mt-8 text-center border-t border-slate-100 pt-6">
      <p class="text-slate-400 text-xs mb-2">¿Nuevo en la empresa?</p>
      <a routerLink="/registro" class="text-sm font-bold text-blue-600 hover:text-blue-800 hover:underline cursor-pointer transition-colors">Crear una cuenta</a>
    </div>
  </div>
</div>
